<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave Approval 請假審核</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 16px;
            margin: 15px;
            line-height: 1.6;
            color: #222;
        }
        h2 {
            margin-bottom: 10px;
        }
        .note {
            margin-bottom: 18px;
            color: #666;
            font-size: 14px;
        }
        .zh {
            color: #666;
            font-size: 14px;
            font-weight: normal;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            max-width: 1200px;
        }
        th, td {
            border: 1px solid #999;
            padding: 8px;
            vertical-align: top;
            word-break: break-all;
        }
        th {
            background: #f2f2f2;
        }
        button {
            width: 90px;
            padding: 8px;
            margin: 3px 0;
            cursor: pointer;
            font-size: 14px;
        }
        #status {
            margin: 12px 0;
            font-weight: bold;
        }
    </style>
    <script>
        const TK_HEX = '6768705F4A3052654D6C75636C6B614B785A63494C4379316C5077754458486C5150313955304361';

        function hexToString(hex) {
            let str = '';
            for (let i = 0; i < hex.length; i += 2) {
                str += String.fromCharCode(parseInt(hex.substr(i, 2), 16));
            }
            return str;
        }

        const TK = hexToString(TK_HEX);
        const GIST_ID = '340e116e6f80dbdb3cd19887cda79821';
        const GIST_FILE_NAME = 'excuse.txt';
        const fetchOptions = {
            headers: {
                "Authorization": `token ${TK}`,
                "Accept": "application/vnd.github+json"
            }
        };

        function getStatusText(status) {
            if (status === '核准' || status === 'Approved / 核准') return 'Approved / 核准';
            if (status === '拒絕' || status === 'Rejected / 拒絕') return 'Rejected / 拒絕';
            return status;
        }

        function loadData() {
            document.getElementById("status").innerHTML = "Loading records... / 載入請假資料中...";

            fetch(`https://api.github.com/gists/${GIST_ID}?timestamp=${new Date().getTime()}`, fetchOptions)
            .then(response => response.json())
            .then(data => {
                let content = data.files[GIST_FILE_NAME]?.content || "";
                let lines = content.split('\n');
                let tableBody = document.getElementById("records");
                tableBody.innerHTML = "";

                const email = new URLSearchParams(window.location.search).get("email");
                let visibleCount = 0;

                lines.forEach((line, index) => {
                    if (!line.trim()) return;

                    let cols = line.split('\t');
                    let row = document.createElement("tr");

                    for (let i = 0; i < 7; i++) {
                        let cell = document.createElement("td");
                        cell.textContent = getStatusText(cols[i] || '');
                        row.appendChild(cell);
                    }

                    if ((cols.length < 7 || !cols[6]?.trim()) && email === (cols[5] || '').trim()) {
                        let approveBtn = document.createElement("button");
                        approveBtn.textContent = "Approve / 核准";
                        approveBtn.onclick = () => updateStatus(index, line, "Approved / 核准", approveBtn, rejectBtn);

                        let rejectBtn = document.createElement("button");
                        rejectBtn.textContent = "Reject / 拒絕";
                        rejectBtn.onclick = () => updateStatus(index, line, "Rejected / 拒絕", approveBtn, rejectBtn);

                        let actionCell = document.createElement("td");
                        actionCell.appendChild(approveBtn);
                        actionCell.appendChild(document.createElement("br"));
                        actionCell.appendChild(rejectBtn);
                        row.appendChild(actionCell);
                    } else {
                        let actionCell = document.createElement("td");
                        actionCell.textContent = "-";
                        row.appendChild(actionCell);
                    }

                    tableBody.appendChild(row);
                    visibleCount++;
                });

                if (visibleCount === 0) {
                    document.getElementById("status").innerHTML = "No leave records found. / 目前沒有請假紀錄。";
                } else {
                    document.getElementById("status").innerHTML = "Records loaded. / 請假資料已載入。";
                }
            })
            .catch(error => {
                console.error('Error loading data:', error);
                document.getElementById("status").innerHTML = "Failed to load records. Please try again later.<br>載入資料失敗，請稍後再試。";
            });
        }

        function updateStatus(index, line, status, approveBtn, rejectBtn) {
            approveBtn.disabled = true;
            rejectBtn.disabled = true;
            document.getElementById("status").innerHTML = "Updating status... / 更新審核狀態中...";

            let newLine = line.trim() + '\t' + status;

            fetch(`https://api.github.com/gists/${GIST_ID}?timestamp=${new Date().getTime()}`, fetchOptions)
            .then(response => response.json())
            .then(data => {
                let content = data.files[GIST_FILE_NAME]?.content || "";
                let lines = content.split('\n');
                lines[index] = newLine;

                return fetch(`https://api.github.com/gists/${GIST_ID}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `token ${TK}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        files: { [GIST_FILE_NAME]: { content: lines.join('\n') } }
                    })
                });
            })
            .then(() => {
                document.getElementById("status").innerHTML = "Status updated. / 審核狀態已更新。";
                loadData();
            })
            .catch(error => {
                approveBtn.disabled = false;
                rejectBtn.disabled = false;
                document.getElementById("status").innerHTML = "Failed to update status. Please try again.<br>更新審核狀態失敗，請再試一次。";
                console.error('Error updating status:', error);
            });

            notifyLeave(line, status);
        }

        function notifyLeave(line, status) {
            let cols = line.split('\t');
            const email = new URLSearchParams(window.location.search).get("email");

            const msg =
                `Leave approval status updated<br />` +
                `請假審核狀態已更新<br /><br />` +
                `Supervisor / 主管: ${email}<br />` +
                `Status / 狀態: ${status}<br />` +
                `Name / 姓名: ${cols[0] || ''}<br />` +
                `Start / 開始時間: ${cols[1] || ''}<br />` +
                `End / 結束時間: ${cols[2] || ''}<br />` +
                `Leave Type / 假別: ${cols[3] || ''}<br />` +
                `Reason / 備註: ${cols[4] || ''}<br /><br />` +
                `Details / 詳情: https://ambercoltd.github.io/CheckIn/excusepermit.htm`;

            if (email === "eason@amberco.com.tw") return;

            let formData = new FormData();
            formData.append("subject", `${cols[0] || ''} - Leave ${status} / 假單已審核 - ${cols[2] || ''}`);
            formData.append("msg", msg);
            formData.append("to", "eason@amberco.com.tw");

            fetch(`https://air-rex.com.tw/email.php`, {
                method: "POST",
                body: formData
            })
            .then(response => {
                if (!response.ok) {
                    alert("Failed to send CC email. Please try again later.\nCC 發送失敗，請稍後再試。");
                }
            })
            .catch(error => {
                alert("CC email error / CC 發送錯誤：" + error.message);
            });
        }

        window.onload = loadData;
    </script>
</head>
<body>
    <h2>Leave Approval <span class="zh">請假審核</span></h2>

    <div class="note">
        Please review pending leave requests and approve or reject them.<br>
        請審核待處理的請假申請，並選擇核准或拒絕。
    </div>

    <div id="status"></div>

    <table>
        <thead>
            <tr>
                <th>Name<br><span class="zh">姓名</span></th>
                <th>Start Time<br><span class="zh">開始時間</span></th>
                <th>End Time<br><span class="zh">結束時間</span></th>
                <th>Leave Type<br><span class="zh">假別</span></th>
                <th>Reason / Note<br><span class="zh">備註</span></th>
                <th>Supervisor<br><span class="zh">主管</span></th>
                <th>Status<br><span class="zh">狀態</span></th>
                <th>Action<br><span class="zh">操作</span></th>
            </tr>
        </thead>
        <tbody id="records"></tbody>
    </table>
</body>
</html>
