<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Time Clock / 打卡</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body {
  font-family: sans-serif;
  padding: 20px;
}
button {
  padding: 10px 16px;
  font-size: 16px;
  margin-right: 8px;
  margin-bottom: 8px;
}
pre {
  background: #111;
  color: #0f0;
  padding: 10px;
  white-space: pre-wrap;
}
.zh {
  color: #666;
  font-size: 14px;
  font-weight: normal;
}
.note {
  color: #666;
  line-height: 1.5;
  margin-bottom: 16px;
}
#loadingOverlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}
#loadingOverlay.show {
  display: flex;
}
.spinner {
  width: 56px;
  height: 56px;
  border: 6px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
#freePass {
  display: none;
  margin-top: 40px;
  padding: 20px;
  font-size: 22px;
  text-align: center;
  background: #fff3cd;
  color: #b02a37;
  border: 2px dashed #ff6b6b;
  border-radius: 12px;
  font-weight: bold;
}
</style>

<script>
function debug(msg) {
  const el = document.getElementById("status");

  if (el) {
    //el.textContent += msg + "\n";
  }
}

/* ================= Basic Settings / 基本設定 ================= */
const GIST_ID = "128158194ad773c072ca111b84286cfb";
const TK_HEX = "6768705F4A3052654D6C75636C6B614B785A63494C4379316C5077754458486C5150313955304361";
const LIFF_ID = "2010236118-JLFjwKdM";

const ALLOWED_LOCATIONS = [
  { name: "Taipei Office / 台北公司", lat: 24.98765303481461, lon: 121.53390134460216, radiusM: 200 },
  { name: "Taichung Office / 台中辦公室", lat: 24.310777911896015, lon: 120.72138183688088, radiusM: 3000 },
  { name: "Houli Micron / 后里美光", lat: 24.318140260826873, lon: 120.72406839843525, radiusM: 3000 },
  { name: "TSMC Tainan / 台積台南", lat: 23.1179631, lon: 120.2246118, radiusM: 10000 },
  { name: "Amber Japan Office / 日本安博", lat: 34.6642848, lon: 135.4960955, radiusM: 3000 },
  { name: "Amber US Office / 美國安博", lat: 33.6825472, lon: -112.1026775, radiusM: 1600 },
  { name: "TSMC Arizona / 台積美國亞歷桑納", lat: 33.7926749, lon: -112.2055389, radiusM: 3200 },
  
];

/* ================= Tools / 工具 ================= */
function hexToString(hex) {
  let s = '';
  for (let i = 0; i < hex.length; i += 2)
    s += String.fromCharCode(parseInt(hex.substr(i, 2), 16));
  return s;
}
const TOKEN = hexToString(TK_HEX);

function isAndroid() {
  return /Android/i.test(navigator.userAgent);
}

/* ================= LIFF ================= */
let lineUserId = null;

async function initLiffOnce() {
  try {

    await liff.init({
      liffId: LIFF_ID
    });

    debug("LIFF INIT OK");

    if (!liff.isLoggedIn()) {
      debug("NOT LOGIN");
      liff.login();
      return false;
    }

    const profile = await liff.getProfile();

    debug("PROFILE=", profile);

    lineUserId = profile.userId;

    document.getElementById("status").innerHTML =
      "LINE UID:<br>" + lineUserId;

    return true;

  } catch (e) {

    debug(e);

    document.getElementById("status").innerHTML =
      "LIFF Error / LIFF 錯誤:<br>" + e;

    return false;
  }
}

/* ================= UI ================= */
function updateTitle() {
  const tel = localStorage.getItem("tel");
  const title = document.getElementById("title");
  const status = liff.isLoggedIn() ? "LINE Verified / LINE已認證" : "Not Logged In / 未登入";
  title.textContent = tel
    ? `📍 ${tel} \\n（${status}）\\n📍 Time Clock V2.6 / 打卡V2.6`
    : `📍 Time Clock V2.6 / 打卡 V2.6`;
}

function showLoading() {
  document.getElementById("loadingOverlay").classList.add("show");
  document.getElementById("btnCheckin").disabled = true;
}

function hideLoading() {
  document.getElementById("loadingOverlay").classList.remove("show");
  document.getElementById("btnCheckin").disabled = false;
}

/* ================= TEL ================= */
function getTel() {
  let tel = localStorage.getItem("tel");
  if (!tel || !/^\d{10}$/.test(tel)) {
    tel = prompt("Please enter your 10-digit mobile phone number.\n請輸入 10 碼手機號碼：");
    if (!/^\d{10}$/.test(tel)) return null;
    localStorage.setItem("tel", tel);
  }
  updateTitle();
  return tel;
}

/* ================= GPS ================= */
function distance(lat1, lon1, lat2, lon2) {
  const R = 6371e3;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  return 2 * R * Math.asin(Math.sqrt(
    Math.sin(dLat / 2) ** 2 +
    Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
    Math.sin(dLon / 2) ** 2
  ));
}

function findNearestLocation(lat, lon) {
  let nearest = null, min = Infinity;
  for (const l of ALLOWED_LOCATIONS) {
    const d = distance(lat, lon, l.lat, l.lon);
    if (d < min) {
      min = d;
      nearest = l;
    }
  }
  return { name: nearest.name, distance: Math.round(min) };
}

/* ================= Location / 定位 ================= */
function tryGetLocation() {
  return new Promise((resolve, reject) => {
    navigator.geolocation.getCurrentPosition(
      pos => resolve(pos),
      err => reject(err),
      { enableHighAccuracy: true, timeout: 12000 }
    );
  });
}

async function retryLocation() {
  document.getElementById("btnRelocate").style.display = "none";
  try {
    await tryGetLocation();
    document.getElementById("status").innerText = "✅ Location successful. Please check in. / 定位成功，請打卡";
    document.getElementById("btnCheckin").style.display = "inline-block";
  } catch {
    document.getElementById("status").innerText = "❌ Location permission is not enabled. / 尚未開啟定位權限";
    document.getElementById("btnRelocate").style.display = "inline-block";
    Update();
  }
}

/* ================= GitHub ================= */
let gistCache = null;

async function githubGET() {
  return fetch(`https://api.github.com/gists/${GIST_ID}`, {
    headers: {
      "Authorization": `token ${TOKEN}`,
      "Accept": "application/vnd.github+json"
    }
  });
}

async function getGistData() {
  if (gistCache) return gistCache;
  const res = await githubGET();
  if (!res.ok) throw new Error("Failed to connect to Gist / Gist 連線失敗");
  gistCache = await res.json();
  return gistCache;
}

async function githubPATCH(payload) {
  return fetch(`https://api.github.com/gists/${GIST_ID}`, {
    method: "PATCH",
    headers: {
      "Authorization": `token ${TOKEN}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify(payload)
  });
}

/* ================= UID ================= */
function getFileName() {
  return `${lineUserId}.txt`;
}

async function loadUIDFile() {
  try {
    const data = await getGistData();
    const file = data.files[getFileName()];
    if (!file) return false;
    const first = file.content.split("\n")[0];
    const parts = first.split("\t");
    if (parts.length >= 3 && /^\d{10}$/.test(parts[2])) {
      localStorage.setItem("tel", parts[2]);
      return true;
    }
    return false;
  } catch {
    return false;
  }
}

/* ================= Load Records / 讀取紀錄 ================= */
async function loadMyFile() {
  try {
    const data = await getGistData();
    const file = data.files[getFileName()];
    if (!file) {
      document.getElementById("records").textContent = "No time clock records yet. / 尚無打卡紀錄";
      return;
    }
    document.getElementById("records").textContent = file.content;
  } catch {
    document.getElementById("freePass").style.display = "block";
    document.getElementById("btnCheckin").style.display = "none";
    document.getElementById("status").innerText = "⚠ System error. Service is temporarily unavailable. / 系統異常，暫停使用";
  }
}

/* ================= Check In / 打卡 ================= */
async function getLocationSafe() {
  try {
    const pos = await tryGetLocation();

    const nearest = findNearestLocation(
      pos.coords.latitude,
      pos.coords.longitude
    );

    return {
      ok: true,
      text: `${nearest.name} (${nearest.distance}m)`,
      distance: nearest.distance,
      locationName: nearest.name
    };
  } catch (e) {
    return {
      ok: false,
      text: "User denied location access / 用戶拒絕提供定位",
      distance: 999999,
      locationName: ""
    };
  }
}

async function Update() {
  if (!getTel()) return;

  showLoading();

  try {
    // ① Try to get location. This will not throw.
    // ① 嘗試取得定位（不會 throw）
    const locResult = await getLocationSafe();

    // =====================
    // Distance + overtime check
    // 距離 + 加班檢查
    // =====================
    const warnings = [];

    if (locResult.ok) {

      const nearestOffice = ALLOWED_LOCATIONS.find(
        x => x.name === locResult.locationName
      );

      if (
        nearestOffice &&
        locResult.distance > nearestOffice.radiusM
      ) {
        warnings.push(
          `📍 Outside the allowed check-in range / 超出打卡範圍\n` +
          `Location / 位置：${locResult.locationName}\n` +
          `Distance / 距離：${locResult.distance}m\n` +
          `Allowed range / 允許範圍：${nearestOffice.radiusM}m`
        );
      }
    }

    const now = new Date();
    const hhmm = now.getHours() * 100 + now.getMinutes();

    if (hhmm < 800 || hhmm >= 1800) {
      warnings.push(
        "⏰ This is overtime hours. / 已進入加班時間\n" +
        "Please confirm that you have submitted an overtime request form. / 請確認是否已送出加班申請單"
      );
    }

    if (warnings.length > 0) {

      const msg =
        "⚠ Notice / 注意\n\n" +
        warnings.join("\n\n") +
        "\n\nDo you still want to check in? / 是否仍要打卡？";

      if (!confirm(msg)) {
        hideLoading();
        return;
      }
    }

    // ② Create timestamp
    // ② 組時間
    const timeStr =
      `${now.getFullYear()}/${String(now.getMonth() + 1).padStart(2, '0')}/${String(now.getDate()).padStart(2, '0')} ` +
      `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;

    // ③ Create record line
    // ③ 組紀錄行
    const line =
      `050\t${timeStr}\t${getTel()}\t${locResult.text}`;

    // ④ Read old records
    // ④ 讀舊資料
    const data = await getGistData();
    const old = data.files[getFileName()]?.content || "";
    const nowTime = Date.now();

    const filtered = old
      .split(/\n/)
      .map(l => l.replace(/\r/g, "").trim())
      .filter(l => l !== "")
      .filter(l => {
        const p = l.split("\t");
        if (!p[1]) return false;
        const t = Date.parse(p[1]);
        return !isNaN(t) && (nowTime - t <= 90 * 86400000);
      });

    filtered.unshift(line);
    const finalContent = filtered.join("\r\n");

    // ⑤ Write back to Gist
    // ⑤ 寫回 Gist
    await githubPATCH({
      files: {
        [getFileName()]: { content: finalContent }
      }
    });

    gistCache = null;

    // ⑥ UI feedback
    // ⑥ UI 回饋
    document.getElementById("status").innerText =
      locResult.ok
        ? "✅ Check-in successful. / 打卡成功"
        : "⚠ Check-in successful, but location was not provided. / 打卡成功（未提供定位）";

    document.getElementById("records").textContent = finalContent;

  } catch (e) {
    alert("❌ Check-in failed. Please take a screenshot and notify MIS.\n打卡失敗：請截圖通知 MIS\n\n" + e);
  } finally {
    hideLoading();
  }
}


/* ================= Start / 啟動 ================= */
window.onload = async () => {

  document.getElementById("status").innerHTML =
    "Initializing LIFF... / LIFF 初始化中...";

  document.getElementById("btnCheckin").style.display = "none";

  const ok = await initLiffOnce();

  if (!ok) {
    return;
  }

  if (!lineUserId) {

    document.getElementById("status").innerHTML =
      "❌ Unable to get LINE UID. / 無法取得 LINE UID";

    return;
  }

  document.getElementById("status").innerHTML =
    "✅ LINE UID acquired successfully. / UID 取得成功<br>" + lineUserId;

  const hasUID = await loadUIDFile();

  if (!hasUID) {

    alert("First-time users must enter a mobile phone number.\n首次使用請輸入手機號碼。");

    localStorage.removeItem("tel");
    getTel();
  }

  updateTitle();

  await loadMyFile();

  try {

    await tryGetLocation();

    document.getElementById("status").innerHTML +=
      "<br>✅ GPS is working properly. / GPS 正常";

    document.getElementById("btnCheckin").style.display =
      "inline-block";

  } catch (e) {

    document.getElementById("status").innerHTML +=
      "<br>⚠ GPS failed / GPS 失敗：" + e.message;

    document.getElementById("btnRelocate").style.display =
      "inline-block";
  }
};
</script>
</head>

<body>

<div id="loadingOverlay">
  <div class="spinner"></div>
</div>

<h2 id="title">📍 Time Clock System V2.6 / 打卡系統V2.6</h2>

<div class="note">
  GPS must ON.<br>
  GPS 定位務必開啟。
</div>

<button id="btnCheckin" onclick="Update()">Check In / 打卡</button>
<button id="btnRelocate" style="display:none" onclick="retryLocation()">📍 Location Permission Error / 定位權限錯誤</button>

<p id="status"></p>

<div id="freePass">
  🎉 The time clock system is unavailable today!<br>
  No check-in is required for now. 😆<br>
  <span class="zh">卡機壞了！今天暫時不用打卡 😆</span>
</div>

<h3>📄 My Records <span class="zh">我的紀錄</span></h3>
<pre id="records"></pre>

</body>
</html>
