<script type="text/javascript">

var TK_HEX = '6768705F4A3052654D6C75636C6B614B785A63494C4379316C5077754458486C5150313955304361';

function hexToString(hex) {
    var str = '';
    var i;

    for (i = 0; i < hex.length; i += 2) {
        str += String.fromCharCode(parseInt(hex.substr(i, 2), 16));
    }

    return str;
}

var TK = hexToString(TK_HEX);

var GIST_ID = '340e116e6f80dbdb3cd19887cda79821';
var GIST_FILE_NAME = 'excuse.txt';

function askForName() {

    var name = localStorage.getItem('name');

    if (!name || name === 'null') {

        name = prompt('и«Ӣијёе…ҘжӮЁзҡ„еҗҚеӯ—пјҡ', '');

        if (name && name !== '') {
            localStorage.setItem('name', name);
        } else {
            document.getElementById('status').innerHTML = 'и«Ӣијёе…ҘжӯЈзўәзҡ„еҗҚеӯ—';
            return null;
        }
    }

    return name;
}

function fetchLeaveRecords(name) {

    var xhr = new XMLHttpRequest();

    xhr.onreadystatechange = function () {

        if (xhr.readyState === 4 && xhr.status === 200) {

            var data = JSON.parse(xhr.responseText);

            var content = '';

            if (data.files && data.files[GIST_FILE_NAME]) {
                content = data.files[GIST_FILE_NAME].content;
            }

            var lines = content.split('\n');

            var output = '';
            var i;

            for (i = 0; i < lines.length; i++) {

                var parts = lines[i].split('\t');

                if (parts.length >= 3 && parts[0] === name) {
                    output += lines[i] + '<br />';
                }
            }

            if (output === '') {
                output = name + ' з„ЎжңҖиҝ‘и«ӢеҒҮзҙҖйҢ„';
            }

            document.getElementById('exdata').innerHTML =
                'жңҖиҝ‘и«ӢеҒҮзҙҖйҢ„пјҡ<br />' + output;
        }
    };

    xhr.open(
        'GET',
        'https://api.github.com/gists/' + GIST_ID + '?t=' + new Date().getTime(),
        true
    );

    xhr.setRequestHeader('Authorization', 'token ' + TK);
    xhr.setRequestHeader('Accept', 'application/vnd.github+json');

    xhr.send();
}

function submitLeave() {

    var button = document.getElementById('submitButton');

    button.disabled = true;
    button.innerHTML = 'з”іи«Ӣдёӯ...';

    var name = askForName();

    if (name === null) {
        button.disabled = false;
        button.innerHTML = 'йҖҒеҮәи«ӢеҒҮз”іи«Ӣ';
        return;
    }

    var startDate = document.getElementById('startDate').value;
    var endDate = document.getElementById('endDate').value;

    var startTime = document.getElementById('startTime').value;
    var endTime = document.getElementById('endTime').value;

    var leaveType = document.getElementById('leaveType').value;
    var reason = document.getElementById('reason').value;
    var master = document.getElementById('master').value;

    if (
        startDate === '' ||
        endDate === '' ||
        startTime === '' ||
        endTime === '' ||
        leaveType === '' ||
        reason === '' ||
        master === ''
    ) {

        document.getElementById('status').innerHTML =
            'и«Ӣе®Ңж•ҙеЎ«еҜ«жүҖжңүж¬„дҪҚ';

        button.disabled = false;
        button.innerHTML = 'йҖҒеҮәи«ӢеҒҮз”іи«Ӣ';

        return;
    }

    var startDateTime = startDate + ' ' + startTime;
    var endDateTime = endDate + ' ' + endTime;

    var content =
        name + '\t' +
        startDateTime + '\t' +
        endDateTime + '\t' +
        leaveType + '\t' +
        reason + '\t' +
        master + '\r\n';

    notifyLeave(
        content,
        name,
        startDateTime,
        endDateTime,
        leaveType,
        master,
        reason
    );
}

function notifyLeave(
    content,
    name,
    startTime,
    endTime,
    leaveType,
    master,
    reason
) {

    var reviewLink =
        'https://ambercoltd.github.io/CheckIn/excusepermit.htm?email=' +
        encodeURIComponent(master);

    var msg =
        'е§“еҗҚ: ' + name + '<br />' +
        'еҒҮеҲҘ: ' + leaveType + '<br />' +
        'еҺҹеӣ : ' + reason + '<br />' +
        'й–Ӣе§Ӣ: ' + startTime + '<br />' +
        'зөҗжқҹ: ' + endTime + '<br /><br />' +
        'еүҚеҫҖеҜ©ж ё: ' + reviewLink;

    var formData = new FormData();

    formData.append('subject', name + ' ' + startTime + ' еҒҮе–®йҖҒз°Ҫ');
    formData.append('msg', msg);
    formData.append('to', master);

    var xhr = new XMLHttpRequest();

    xhr.onreadystatechange = function () {

        if (xhr.readyState === 4) {

            if (xhr.status === 200) {

                updateGist(
                    content,
                    name
                );

            } else {

                document.getElementById('status').innerHTML =
                    'Email зҷјйҖҒеӨұж•—';

                document.getElementById('submitButton').disabled = false;

                document.getElementById('submitButton').innerHTML =
                    'йҖҒеҮәи«ӢеҒҮз”іи«Ӣ';
            }
        }
    };

    xhr.open(
        'POST',
        'https://air-rex.com.tw/email.php',
        true
    );

    xhr.send(formData);
}

function updateGist(content, name) {

    var xhr = new XMLHttpRequest();

    xhr.onreadystatechange = function () {

        if (xhr.readyState === 4 && xhr.status === 200) {

            var data = JSON.parse(xhr.responseText);

            var currentContent = '';

            if (data.files && data.files[GIST_FILE_NAME]) {
                currentContent = data.files[GIST_FILE_NAME].content;
            }

            var newContent = content + currentContent;

            var patchXhr = new XMLHttpRequest();

            patchXhr.onreadystatechange = function () {

                if (patchXhr.readyState === 4) {

                    document.getElementById('status').innerHTML =
                        'и«ӢеҒҮз”іи«Ӣе·ІжҸҗдәӨпјҢи«ӢиҮӘиЎҢиҲҮдё»з®ЎзўәиӘҚ';

                    document.getElementById('submitButton').disabled = false;

                    document.getElementById('submitButton').innerHTML =
                        'йҖҒеҮәи«ӢеҒҮз”іи«Ӣ';

                    fetchLeaveRecords(name);
                }
            };

            patchXhr.open(
                'PATCH',
                'https://api.github.com/gists/' + GIST_ID,
                true
            );

            patchXhr.setRequestHeader(
                'Authorization',
                'token ' + TK
            );

            patchXhr.setRequestHeader(
                'Content-Type',
                'application/json'
            );

            patchXhr.send(
                JSON.stringify({
                    files: {
                        excuse: {
                            content: newContent
                        }
                    }
                })
            );
        }
    };

    xhr.open(
        'GET',
        'https://api.github.com/gists/' + GIST_ID,
        true
    );

    xhr.setRequestHeader('Authorization', 'token ' + TK);

    xhr.send();
}

window.onload = function () {

    var name = askForName();

    if (name) {
        fetchLeaveRecords(name);
    }
};

</script>
