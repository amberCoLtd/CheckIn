<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<html xmlns="http://www.w3.org/1999/xhtml" lang="zh-TW">
<head>

<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />

<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>Amber請假系統</title>

<style type="text/css">

body{
    font-family: Arial, Helvetica, sans-serif;
    font-size:16px;
    margin:15px;
    line-height:1.8;
}

h2{
    margin-bottom:20px;
}

label{
    display:block;
    margin-top:10px;
}

input,
select,
button{
    width:100%;
    max-width:400px;
    padding:10px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    margin-top:20px;
    cursor:pointer;
}

#status,
#exdata{
    margin-top:20px;
    white-space:normal;
    word-break:break-all;
}

</style>

<script type="text/javascript">

var TK_HEX = '6768705F4A3052654D6C75636C6B614B785A63494C4379316C5077754458486C5150313955304361';

function hexToString(hex) {

    var str = '';
    var i;

    for (i = 0; i < hex.length; i += 2) {
        str += String.fromCharCode(parseInt(hex.substr(i, 2), 16));
    }

    return str;
}

var TK = hexToString(TK_HEX);

var GIST_ID = '340e116e6f80dbdb3cd19887cda79821';

var GIST_FILE_NAME = 'excuse.txt';

function askForName() {

    var name = localStorage.getItem('name');

    if (!name || name === 'null') {

        name = prompt('請輸入您的名字：', '');

        if (name && name !== '') {
            localStorage.setItem('name', name);
        } else {
            document.getElementById('status').innerHTML =
                '請輸入正確的名字';
            return null;
        }
    }

    return name;
}

function fetchLeaveRecords(name) {

    var xhr = new XMLHttpRequest();

    xhr.onreadystatechange = function () {

        if (xhr.readyState === 4 && xhr.status === 200) {

            var data = JSON.parse(xhr.responseText);

            var content = '';

            if (data.files && data.files[GIST_FILE_NAME]) {
                content = data.files[GIST_FILE_NAME].content;
            }

            var lines = content.split('\n');

            var output = '';

            var i;

            for (i = 0; i < lines.length; i++) {

                var parts = lines[i].split('\t');

                if (
                    parts.length >= 3 &&
                    parts[0]
                        .replace(/\uFEFF/g, '')
                        .replace(/\r/g, '')
                        .replace(/^\s+|\s+$/g, '') === name
                ) {
                    output += lines[i] + '<br />';
                }
            }

            if (output === '') {
                output = name + ' 無最近請假紀錄';
            }

            document.getElementById('exdata').innerHTML =
                '最近請假紀錄：<br />' + output;
        }
    };

    xhr.open(
        'GET',
        'https://api.github.com/gists/' + GIST_ID + '?t=' + new Date().getTime(),
        true
    );

    xhr.setRequestHeader(
        'Authorization',
        'token ' + TK
    );

    xhr.setRequestHeader(
        'Accept',
        'application/vnd.github+json'
    );

    xhr.send();
}

function submitLeave() {

    var button = document.getElementById('submitButton');

    button.disabled = true;

    button.innerHTML = '申請中...';

    var name = askForName();

    if (name === null) {

        button.disabled = false;

        button.innerHTML = '送出請假申請';

        return;
    }

    var startDate =
        document.getElementById('startDate').value;

    var endDate =
        document.getElementById('endDate').value;

    var startTime =
        document.getElementById('startTime').value;

    var endTime =
        document.getElementById('endTime').value;

    var leaveType =
        document.getElementById('leaveType').value;

    var reason =
        document.getElementById('reason').value;

    var master =
        document.getElementById('master').value;

    if (
        startDate === '' ||
        endDate === '' ||
        startTime === '' ||
        endTime === '' ||
        leaveType === '' ||
        reason === '' ||
        master === ''
    ) {

        document.getElementById('status').innerHTML =
            '請完整填寫所有欄位';

        button.disabled = false;

        button.innerHTML = '送出請假申請';

        return;
    }

    startDate = startDate.replace(/\//g, '-');

    endDate = endDate.replace(/\//g, '-');

    var startDateTime =
        startDate + ' ' + startTime;

    var endDateTime =
        endDate + ' ' + endTime;

    var content =
        name + '\t' +
        startDateTime + '\t' +
        endDateTime + '\t' +
        leaveType + '\t' +
        reason + '\t' +
        master + '\r\n';

    notifyLeave(
        content,
        name,
        startDateTime,
        endDateTime,
        leaveType,
        master,
        reason
    );
}

function notifyLeave(
    content,
    name,
    startTime,
    endTime,
    leaveType,
    master,
    reason
) {

    var reviewLink =
        'https://ambercoltd.github.io/CheckIn/excusepermit.htm?email=' +
        encodeURIComponent(master);

    var msg =
        '姓名: ' + name + '<br />' +
        '假別: ' + leaveType + '<br />' +
        '原因: ' + reason + '<br />' +
        '開始: ' + startTime + '<br />' +
        '結束: ' + endTime + '<br /><br />' +
        '前往審核: ' + reviewLink;

    var formData = new FormData();

    formData.append(
        'subject',
        name + ' ' + startTime + ' 假單送簽'
    );

    formData.append('msg', msg);

    formData.append('to', master);

    var xhr = new XMLHttpRequest();

    xhr.onreadystatechange = function () {

        if (xhr.readyState === 4) {

            if (xhr.status === 200) {

                updateGist(content, name);

            } else {

                document.getElementById('status').innerHTML =
                    'Email 發送失敗';

                document.getElementById('submitButton').disabled =
                    false;

                document.getElementById('submitButton').innerHTML =
                    '送出請假申請';
            }
        }
    };

    xhr.open(
        'POST',
        'https://air-rex.com.tw/email.php',
        true
    );

    xhr.send(formData);
}

function updateGist(content, name) {

    var xhr = new XMLHttpRequest();

    xhr.onreadystatechange = function () {

        if (xhr.readyState === 4 && xhr.status === 200) {

            var data = JSON.parse(xhr.responseText);

            var currentContent = '';

            if (
                data.files &&
                data.files[GIST_FILE_NAME]
            ) {
                currentContent =
                    data.files[GIST_FILE_NAME].content;
            }

            var newContent =
                content + currentContent;

            var patchXhr =
                new XMLHttpRequest();

            patchXhr.onreadystatechange =
                function () {

                if (patchXhr.readyState === 4) {

                    document.getElementById('status').innerHTML =
                        '請假申請已提交，請自行與主管確認';

                    document.getElementById('submitButton').disabled =
                        false;

                    document.getElementById('submitButton').innerHTML =
                        '送出請假申請';

                    fetchLeaveRecords(name);
                }
            };

            patchXhr.open(
                'PATCH',
                'https://api.github.com/gists/' + GIST_ID,
                true
            );

            patchXhr.setRequestHeader(
                'Authorization',
                'token ' + TK
            );

            patchXhr.setRequestHeader(
                'Content-Type',
                'application/json'
            );

            var bodyData = {
                files: {}
            };

            bodyData.files[GIST_FILE_NAME] = {
                content: newContent
            };

            patchXhr.send(
                JSON.stringify(bodyData)
            );
        }
    };

    xhr.open(
        'GET',
        'https://api.github.com/gists/' + GIST_ID,
        true
    );

    xhr.setRequestHeader(
        'Authorization',
        'token ' + TK
    );

    xhr.send();
}


function showDatePicker(targetId) {

    var picker;

    if (targetId === 'startDate') {
        picker = document.getElementById('startDatePicker');
    }
    else {
        picker = document.getElementById('endDatePicker');
    }

    try {
        if (picker.showPicker) {
            picker.showPicker();
        } else {
            picker.click();
        }
    } catch(e) {
    }
}

function copyDate(textId, pickerId) {

    var picker = document.getElementById(pickerId);

    if (picker.value !== '') {
        document.getElementById(textId).value = picker.value;
    }
}


window.onload = function () {

    var name = askForName();

    if (name) {
        fetchLeaveRecords(name);
    }
};

</script>

</head>

<body>

<label>主管</label>

<select id="master">
    <option value="marshall@amberco.com.tw">黃灝</option>
    <option value="ws@amberco.com.tw">林文勝</option>
    <option value="Karen@amberco.com.tw">劉庚庚</option>
    <option value="eason@amberco.com.tw">蔡一誠</option>
    <option value="tokimusic@gmail.com">陳昕逸</option>
</select>

<select id="leaveType">

<input

</html>
