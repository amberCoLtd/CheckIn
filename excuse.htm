<script type="text/javascript">

var TK_HEX = '6768705F4A3052654D6C75636C6B614B785A63494C4379316C5077754458486C5150313955304361';

function hexToString(hex) {

    var str = '';
    var i;

    for (i = 0; i < hex.length; i += 2) {
        str += String.fromCharCode(parseInt(hex.substr(i, 2), 16));
    }

    return str;
}

var TK = hexToString(TK_HEX);
var GIST_ID = '340e116e6f80dbdb3cd19887cda79821';
var GIST_FILE_NAME = 'excuse.txt';

function askForName() {
    var name = localStorage.getItem('name');

    function isValidName(str) {
        return str && str.trim() !== '' && !/[0-9]/.test(str);
    }

    if (!isValidName(name)) {
        localStorage.removeItem('name');

        while (true) {
            name = prompt('Please enter your name.\n請輸入您的姓名。\n\nPlease enter carefully. If your name is wrong, USD 20 penalty.\n 輸錯姓名罰500元', '');

            if (name === null) {
                alert('Please enter a valid name.\n請輸入正確的姓名。');
                return askForName();
            }

            if (isValidName(name)) {
                localStorage.setItem('name', name.trim());
                break;
            }

            alert('Name cannot be blank or contain numbers.\n姓名不可空白，也不可包含數字。');
        }
    }

    return name.trim();
}

function fetchLeaveRecords(name) {

    var xhr = new XMLHttpRequest();

    xhr.onreadystatechange = function () {

        if (xhr.readyState === 4 && xhr.status === 200) {

            var data = JSON.parse(xhr.responseText);
            var content = '';

            if (data.files && data.files[GIST_FILE_NAME]) {
                content = data.files[GIST_FILE_NAME].content;
            }

            var lines = content.split('\n');
            var output = '';
            var i;

            for (i = 0; i < lines.length; i++) {

                var parts = lines[i].split('\t');

                if (
                    parts.length >= 3 &&
                    parts[0]
                        .replace(/\uFEFF/g, '')
                        .replace(/\r/g, '')
                        .replace(/^\s+|\s+$/g, '') === name
                ) {
                    output += lines[i] + '<br />';
                }
            }

            if (output === '') {
                output = name + ' has no recent leave records.<br />' + name + ' 無最近請假紀錄。';
            }

            document.getElementById('exdata').innerHTML =
                'Recent Leave Records<br /><span class="zh">最近請假紀錄</span><br /><br />' + output;
        }
    };

    xhr.open(
        'GET',
        'https://api.github.com/gists/' + GIST_ID + '?t=' + new Date().getTime(),
        true
    );

    xhr.setRequestHeader('Authorization', 'token ' + TK);
    xhr.setRequestHeader('Accept', 'application/vnd.github+json');
    xhr.send();
}

function submitLeave() {

    var button = document.getElementById('submitButton');

    button.disabled = true;
    button.innerHTML = 'Submitting... / 申請中...';

    var name = askForName();

    if (name === null) {
        button.disabled = false;
        button.innerHTML = 'Submit Leave Request / 送出請假申請';
        return;
    }

    var startDate = document.getElementById('startDate').value;
    var endDate = document.getElementById('endDate').value;
    var startTime = document.getElementById('startTime').value;
    var endTime = document.getElementById('endTime').value;
    var leaveType = document.getElementById('leaveType').value;
    var reason = document.getElementById('reason').value;
    var master = document.getElementById('master').value;

    if (
        startDate === '' ||
        endDate === '' ||
        startTime === '' ||
        endTime === '' ||
        leaveType === '' ||
        reason === '' ||
        master === ''
    ) {

        document.getElementById('status').innerHTML =
            'Please complete all fields.<br />請完整填寫所有欄位。';

        button.disabled = false;
        button.innerHTML = 'Submit Leave Request / 送出請假申請';
        return;
    }

    startDate = startDate.replace(/\//g, '-');
    endDate = endDate.replace(/\//g, '-');

    var startDateTime = startDate + ' ' + startTime;
    var endDateTime = endDate + ' ' + endTime;

    var content =
        name + '\t' +
        startDateTime + '\t' +
        endDateTime + '\t' +
        leaveType + '\t' +
        reason + '\t' +
        master + '\r\n';

    notifyLeave(
        content,
        name,
        startDateTime,
        endDateTime,
        leaveType,
        master,
        reason
    );
}

function notifyLeave(content, name, startTime, endTime, leaveType, master, reason) {

    var reviewLink =
        'https://ambercoltd.github.io/CheckIn/excusepermit.htm?email=' +
        encodeURIComponent(master);

    var msg =
        'Leave Request Submitted<br />' +
        '請假申請送簽<br /><br />' +
        'Name / 姓名: ' + name + '<br />' +
        'Leave Type / 假別: ' + leaveType + '<br />' +
        'Reason / 原因: ' + reason + '<br />' +
        'Start / 開始: ' + startTime + '<br />' +
        'End / 結束: ' + endTime + '<br /><br />' +
        'Please review here / 前往審核: ' + reviewLink;

    var formData = new FormData();

    formData.append(
        'subject',
        name + ' - Leave Request for Approval / 假單送簽 - ' + startTime
    );

    formData.append('msg', msg);
    formData.append('to', master);

    var xhr = new XMLHttpRequest();

    xhr.onreadystatechange = function () {

        if (xhr.readyState === 4) {

            if (xhr.status === 200) {
                updateGist(content, name);
            } else {

                document.getElementById('status').innerHTML =
                    'Failed to send the email. Please try again or contact HR/admin.<br />Email 發送失敗，請重試或聯絡人事／管理員。';

                document.getElementById('submitButton').disabled = false;
                document.getElementById('submitButton').innerHTML =
                    'Submit Leave Request / 送出請假申請';
            }
        }
    };

    xhr.open('POST', 'https://air-rex.com.tw/email.php', true);
    xhr.send(formData);
}

function updateGist(content, name) {

    var xhr = new XMLHttpRequest();

    xhr.onreadystatechange = function () {

        if (xhr.readyState === 4 && xhr.status === 200) {

            var data = JSON.parse(xhr.responseText);
            var currentContent = '';

            if (data.files && data.files[GIST_FILE_NAME]) {
                currentContent = data.files[GIST_FILE_NAME].content;
            }

            var newContent = content + currentContent;
            var patchXhr = new XMLHttpRequest();

            patchXhr.onreadystatechange = function () {

                if (patchXhr.readyState === 4) {

                    document.getElementById('status').innerHTML =
                        'Your leave request has been submitted. Please confirm with your supervisor.<br />請假申請已提交，請自行與主管確認。';

                    document.getElementById('submitButton').disabled = false;
                    document.getElementById('submitButton').innerHTML =
                        'Submit Leave Request / 送出請假申請';

                    fetchLeaveRecords(name);
                }
            };

            patchXhr.open('PATCH', 'https://api.github.com/gists/' + GIST_ID, true);
            patchXhr.setRequestHeader('Authorization', 'token ' + TK);
            patchXhr.setRequestHeader('Content-Type', 'application/json');

            var bodyData = { files: {} };
            bodyData.files[GIST_FILE_NAME] = { content: newContent };

            patchXhr.send(JSON.stringify(bodyData));
        }
    };

    xhr.open('GET', 'https://api.github.com/gists/' + GIST_ID, true);
    xhr.setRequestHeader('Authorization', 'token ' + TK);
    xhr.send();
}


function setDefaultDates() {
    var d = new Date();
    d.setDate(d.getDate() + 1);

    var yyyy = d.getFullYear();
    var mm = String(d.getMonth() + 1).padStart(2, '0');
    var dd = String(d.getDate()).padStart(2, '0');
    var dateStr = yyyy + '-' + mm + '-' + dd;

    document.getElementById('startDate').value = dateStr;
    document.getElementById('endDate').value = dateStr;
}


window.onload = function () {

    setDefaultDates();

    var name = askForName();

    if (name) {
        fetchLeaveRecords(name);
    }
};

</script>
