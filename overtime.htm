<title>Amber加班系統</title>

<style type="text/css">

body{
    font-family: Arial, Helvetica, sans-serif;
    font-size:16px;
    margin:15px;
    line-height:1.8;
}

h2{
    margin-bottom:20px;
}

label{
    display:block;
    margin-top:10px;
}

input,

    width:100%;
    max-width:400px;
    padding:10px;
    font-size:16px;
    box-sizing:border-box;
}

    margin-top:20px;
    cursor:pointer;
}

#status{
    margin-top:20px;
    white-space:normal;
    word-break:break-all;

<script type="text/javascript">

var TK_HEX = '6768705F4A3052654D6C75636C6B614B785A63494C4379316C5077754458486C5150313955304361';

function hexToString(hex) {

    var str = '';
    var i;

    for (i = 0; i < hex.length; i += 2) {
        str += String.fromCharCode(parseInt(hex.substr(i, 2), 16));
    }

    return str;
}

var TK = hexToString(TK_HEX);

var GIST_ID = 'e5a30f0ae2615a23185d4fbc52767adc';

var GIST_FILE_NAME = 'overtime.txt';

function askForName() {
    var name = localStorage.getItem('name');

    // 檢查是否包含數字
    function isValidName(str) {
        return str && str.trim() !== '' && !/[0-9]/.test(str);
    }

    // localStorage 內的名字無效
    if (!isValidName(name)) {
        localStorage.removeItem('name');

        while (true) {
            name = prompt('請輸入您的名字（不可包含數字）：', '');

            if (name === null) {
                document.getElementById('status').innerHTML =
                    '請輸入正確的名字';
                return null;
            }

            if (isValidName(name)) {
                localStorage.setItem('name', name.trim());
                break;
            }

            alert('名字不可為空白且不可包含數字');
        }
    }

    return name.trim();
}

function fetchLeaveRecords(name) {

    var xhr = new XMLHttpRequest();

    xhr.onreadystatechange = function () {

        if (xhr.readyState === 4 && xhr.status === 200) {

            var data = JSON.parse(xhr.responseText);

            var content = '';

            if (
                data.files &&
                data.files[GIST_FILE_NAME]
            ) {
                content =
                    data.files[GIST_FILE_NAME].content;
            }

            var lines = content.split('\n');

            var output = '';

            var i;

            for (i = 0; i < lines.length; i++) {

                var parts = lines[i].split('\t');

                if (
                    parts.length >= 3 &&
                    parts[0]
                        .replace(/\uFEFF/g, '')
                        .replace(/\r/g, '')
                        .replace(/^\s+|\s+$/g, '') === name
                ) {
                    output += lines[i] + '<br />';
                }
            }

            if (output === '') {
                output = name + ' 無最近加班紀錄';
            }

            document.getElementById('status').innerHTML =
                '最近一個月加班紀錄：<br />' + output;
        }
    };

    xhr.open(
        'GET',
        'https://api.github.com/gists/' + GIST_ID + '?t=' + new Date().getTime(),
        true
    );

    xhr.setRequestHeader(
        'Authorization',
        'token ' + TK
    );

    xhr.setRequestHeader(
        'Accept',
        'application/vnd.github+json'
    );

    xhr.send();
}

function submitLeave() {

    var button =
        document.getElementById('submitButton');

    button.disabled = true;

    button.innerHTML = '申請中...';

    var name = askForName();

    if (name === null) {

        button.disabled = false;

        button.innerHTML = '送出加班申請';

        return;
    }

    var startDate =
        document.getElementById('startDate').value;

    var endDate =
        document.getElementById('endDate').value;

    var startTime =
        document.getElementById('startTime').value;

    var endTime =
        document.getElementById('endTime').value;

    var leaveType =
        document.getElementById('leaveType').value;

    var reason =
        document.getElementById('reason').value;

    var master =
        document.getElementById('master').value;

    if (
        startDate === '' ||
        endDate === '' ||
        startTime === '' ||
        endTime === '' ||
        leaveType === '' ||
        reason === ''
    ) {

        document.getElementById('status').innerHTML =
            '請完整填寫所有欄位';

        button.disabled = false;

        button.innerHTML = '送出加班申請';

        return;
    }

    startDate = startDate.replace(/\//g, '-');

    endDate = endDate.replace(/\//g, '-');

    var startDateTime =
        startDate + ' ' + startTime;

    var endDateTime =
        endDate + ' ' + endTime;

    var content =
        name + '\t' +
        startDateTime + '\t' +
        endDateTime + '\t' +
        leaveType + '\t' +
        reason + '\t' +
        master + '\r\n';

    notifyLeave(
        content,
        name,
        startDateTime,
        endDateTime,
        leaveType,
        reason
    );
}

function notifyLeave(
    content,
    name,
    startTime,
    endTime,
    leaveType,
    reason
) {

    var master =
        document.getElementById('master').value;

    var reviewLink =
        'https://ambercoltd.github.io/CheckIn/overtimepermit.htm?email=' +
        encodeURIComponent(master);

    var msg =
        '姓名: ' + name + '<br />' +
        '加班: ' + leaveType + '<br />' +
        '原因: ' + reason + '<br />' +
        '開始: ' + startTime + '<br />' +
        '結束: ' + endTime + '<br /><br />' +
        '前往審核: ' +
        '<a href="' + reviewLink + '">' +
        reviewLink +
        '</a>';

    var formData = new FormData();

    formData.append(
        'subject',
        name + ' ' + startTime + ' 加班送簽'
    );

    formData.append('msg', msg);

    formData.append('to', master);

    var xhr = new XMLHttpRequest();

    xhr.onreadystatechange = function () {

        if (xhr.readyState === 4) {

            if (xhr.status === 200) {

                updateGist(content, name);

            } else {

                document.getElementById('status').innerHTML =
                    'Email 發送失敗';

                document.getElementById('submitButton').disabled =
                    false;

                document.getElementById('submitButton').innerHTML =
                    '送出加班申請';
            }
        }
    };

    xhr.open(
        'POST',
        'https://air-rex.com.tw/email.php',
        true
    );

    xhr.send(formData);
}

function updateGist(content, name) {

    var xhr = new XMLHttpRequest();

    xhr.onreadystatechange = function () {

        if (xhr.readyState === 4 && xhr.status === 200) {

            var data = JSON.parse(xhr.responseText);

            var currentContent = '';

            if (
                data.files &&
                data.files[GIST_FILE_NAME]
            ) {
                currentContent =
                    data.files[GIST_FILE_NAME].content;
            }

            var newContent =
                content + currentContent;

            var patchXhr =
                new XMLHttpRequest();

            patchXhr.onreadystatechange =
                function () {

                if (patchXhr.readyState === 4) {

                    document.getElementById('status').innerHTML =
                        '加班申請已提交，通知已發送';

                    document.getElementById('submitButton').disabled =
                        false;

                    document.getElementById('submitButton').innerHTML =
                        '送出加班申請';

                    fetchLeaveRecords(name);
                }
            };

            patchXhr.open(
                'PATCH',
                'https://api.github.com/gists/' + GIST_ID,
                true
            );

            patchXhr.setRequestHeader(
                'Authorization',
                'token ' + TK
            );

            patchXhr.setRequestHeader(
                'Content-Type',
                'application/json'
            );

            var bodyData = {
                files: {}
            };

            bodyData.files[GIST_FILE_NAME] = {
                content: newContent
            };

            patchXhr.send(
                JSON.stringify(bodyData)
            );
        }
    };

    xhr.open(
        'GET',
        'https://api.github.com/gists/' + GIST_ID,
        true
    );

    xhr.setRequestHeader(
        'Authorization',
        'token ' + TK
    );

    xhr.send();
}

function pad2(num) {

    if (num < 10) {
        return '0' + num;
    }

    return '' + num;
}

window.onload = function () {

    var name = askForName();

    if (name) {
        fetchLeaveRecords(name);
    }

    var today = new Date();

    var y = today.getFullYear();

    var m = pad2(today.getMonth() + 1);

    var d = pad2(today.getDate());

    var todayText =
        y + '-' + m + '-' + d;

    document.getElementById('startDate').value =
        todayText;

    document.getElementById('endDate').value =
        todayText;

    document.getElementById('startDate').onchange =
        function () {

        document.getElementById('endDate').value =
            this.value;
    };
};

</script>

</head>
