<script type="text/javascript">

var TK_HEX = '6768705F4A3052654D6C75636C6B614B785A63494C4379316C5077754458486C5150313955304361';

function hexToString(hex) {
    var str = '';
    var i;
    for (i = 0; i < hex.length; i += 2) {
        str += String.fromCharCode(parseInt(hex.substr(i, 2), 16));
    }
    return str;
}

var TK = hexToString(TK_HEX);
var GIST_ID = 'e5a30f0ae2615a23185d4fbc52767adc';
var GIST_FILE_NAME = 'overtime.txt';

function askForName() {
    var name = localStorage.getItem('name');

    function isValidName(str) {
        return str && str.trim() !== '' && !/[0-9]/.test(str);
    }

    if (!isValidName(name)) {
        localStorage.removeItem('name');

        while (true) {
            name = prompt('Please enter your full name.\n請輸入您的姓名。\n\nPlease enter carefully. If your name is wrong, please contact HR/admin to correct it.', '');

            if (name === null) {
                document.getElementById('status').innerHTML =
                    'Please enter a valid name.<br />請輸入正確的姓名。';
                return null;
            }

            if (isValidName(name)) {
                localStorage.setItem('name', name.trim());
                break;
            }

            alert('Name cannot be blank or contain numbers.\n姓名不可空白，也不可包含數字。');
        }
    }

    return name.trim();
}

function fetchOvertimeRecords(name) {
    var xhr = new XMLHttpRequest();

    xhr.onreadystatechange = function () {
        if (xhr.readyState === 4 && xhr.status === 200) {
            var data = JSON.parse(xhr.responseText);
            var content = '';

            if (data.files && data.files[GIST_FILE_NAME]) {
                content = data.files[GIST_FILE_NAME].content;
            }

            var lines = content.split('\n');
            var output = '';
            var i;

            for (i = 0; i < lines.length; i++) {
                var parts = lines[i].split('\t');

                if (
                    parts.length >= 3 &&
                    parts[0]
                        .replace(/\uFEFF/g, '')
                        .replace(/\r/g, '')
                        .replace(/^\s+|\s+$/g, '') === name
                ) {
                    output += lines[i] + '<br />';
                }
            }

            if (output === '') {
                output = name + ' has no recent overtime records.<br />' + name + ' 無最近加班紀錄。';
            }

            document.getElementById('status').innerHTML =
                'Recent Overtime Records<br /><span class="zh">最近加班紀錄</span><br /><br />' + output;
        }
    };

    xhr.open(
        'GET',
        'https://api.github.com/gists/' + GIST_ID + '?t=' + new Date().getTime(),
        true
    );

    xhr.setRequestHeader('Authorization', 'token ' + TK);
    xhr.setRequestHeader('Accept', 'application/vnd.github+json');
    xhr.send();
}

function submitOvertime() {
    var button = document.getElementById('submitButton');

    button.disabled = true;
    button.innerHTML = 'Submitting... / 申請中...';

    var name = askForName();

    if (name === null) {
        button.disabled = false;
        button.innerHTML = 'Submit Overtime Request / 送出加班申請';
        return;
    }

    var startDate = document.getElementById('startDate').value;
    var endDate = document.getElementById('endDate').value;
    var startTime = document.getElementById('startTime').value;
    var endTime = document.getElementById('endTime').value;
    var overtimeType = document.getElementById('overtimeType').value;
    var reason = document.getElementById('reason').value;
    var master = document.getElementById('master').value;

    if (
        startDate === '' ||
        endDate === '' ||
        startTime === '' ||
        endTime === '' ||
        overtimeType === '' ||
        reason === '' ||
        master === ''
    ) {
        document.getElementById('status').innerHTML =
            'Please complete all fields.<br />請完整填寫所有欄位。';

        button.disabled = false;
        button.innerHTML = 'Submit Overtime Request / 送出加班申請';
        return;
    }

    startDate = startDate.replace(/\//g, '-');
    endDate = endDate.replace(/\//g, '-');

    var startDateTime = startDate + ' ' + startTime;
    var endDateTime = endDate + ' ' + endTime;

    var content =
        name + '\t' +
        startDateTime + '\t' +
        endDateTime + '\t' +
        overtimeType + '\t' +
        reason + '\t' +
        master + '\r\n';

    notifyOvertime(
        content,
        name,
        startDateTime,
        endDateTime,
        overtimeType,
        master,
        reason
    );
}

function notifyOvertime(content, name, startTime, endTime, overtimeType, master, reason) {
    var reviewLink =
        'https://ambercoltd.github.io/CheckIn/overtimepermit.htm?email=' +
        encodeURIComponent(master);

    var msg =
        'Overtime Request Submitted<br />' +
        '加班申請送簽<br /><br />' +
        'Name / 姓名: ' + name + '<br />' +
        'Overtime Type / 加班類型: ' + overtimeType + '<br />' +
        'Reason / 原因: ' + reason + '<br />' +
        'Start / 開始: ' + startTime + '<br />' +
        'End / 結束: ' + endTime + '<br /><br />' +
        'Please review here / 前往審核: ' +
        '<a href="' + reviewLink + '">' + reviewLink + '</a>';

    var formData = new FormData();

    formData.append(
        'subject',
        name + ' - Overtime Request for Approval / 加班送簽 - ' + startTime
    );

    formData.append('msg', msg);
    formData.append('to', master);

    var xhr = new XMLHttpRequest();

    xhr.onreadystatechange = function () {
        if (xhr.readyState === 4) {
            if (xhr.status === 200) {
                updateGist(content, name);
            } else {
                document.getElementById('status').innerHTML =
                    'Failed to send the email. Please try again or contact HR/admin.<br />Email 發送失敗，請重試或聯絡人事／管理員。';

                document.getElementById('submitButton').disabled = false;
                document.getElementById('submitButton').innerHTML =
                    'Submit Overtime Request / 送出加班申請';
            }
        }
    };

    xhr.open('POST', 'https://air-rex.com.tw/email.php', true);
    xhr.send(formData);
}

function updateGist(content, name) {
    var xhr = new XMLHttpRequest();

    xhr.onreadystatechange = function () {
        if (xhr.readyState === 4 && xhr.status === 200) {
            var data = JSON.parse(xhr.responseText);
            var currentContent = '';

            if (data.files && data.files[GIST_FILE_NAME]) {
                currentContent = data.files[GIST_FILE_NAME].content;
            }

            var newContent = content + currentContent;
            var patchXhr = new XMLHttpRequest();

            patchXhr.onreadystatechange = function () {
                if (patchXhr.readyState === 4) {
                    document.getElementById('status').innerHTML =
                        'Your overtime request has been submitted. Please confirm with your supervisor.<br />加班申請已提交，請自行與主管確認。';

                    document.getElementById('submitButton').innerHTML =
                        'Successfully submitted / 已送出';

                    fetchOvertimeRecords(name);
                }
            };

            patchXhr.open('PATCH', 'https://api.github.com/gists/' + GIST_ID, true);
            patchXhr.setRequestHeader('Authorization', 'token ' + TK);
            patchXhr.setRequestHeader('Content-Type', 'application/json');

            var bodyData = { files: {} };
            bodyData.files[GIST_FILE_NAME] = { content: newContent };

            patchXhr.send(JSON.stringify(bodyData));
        }
    };

    xhr.open('GET', 'https://api.github.com/gists/' + GIST_ID, true);
    xhr.setRequestHeader('Authorization', 'token ' + TK);
    xhr.send();
}

function pad2(num) {
    if (num < 10) {
        return '0' + num;
    }
    return '' + num;
}

function getDateText(dateObj) {
    var y = dateObj.getFullYear();
    var m = pad2(dateObj.getMonth() + 1);
    var d = pad2(dateObj.getDate());
    return y + '-' + m + '-' + d;
}

window.onload = function () {
    var name = askForName();

    if (name) {
        fetchOvertimeRecords(name);
    }

    var today = new Date();
    var todayText = getDateText(today);

    document.getElementById('startDate').value = todayText;
    document.getElementById('endDate').value = todayText;

    document.getElementById('startDate').onchange = function () {
        document.getElementById('endDate').value = this.value;
    };
};

</script>
